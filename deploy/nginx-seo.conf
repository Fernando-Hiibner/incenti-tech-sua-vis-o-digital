# Include this server block configuration in the Nginx vhost that serves incentitech.com.br.
# Adjust `root` to the absolute path of the built `dist` directory on the server.

server {
  listen 80;
  server_name incentitech.com.br www.incentitech.com.br;
  root /var/www/incentitech/dist;
  index index.html;

  charset utf-8;
  charset_types
    text/html
    text/css
    application/javascript
    application/json
    image/svg+xml
    text/xml
    application/xml
    text/plain;

  gzip on;
  gzip_vary on;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml
    application/rss+xml
    image/svg+xml;

  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://t.contentsquare.net; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://www.google-analytics.com https://stats.g.doubleclick.net https://*.contentsquare.net; frame-src 'self' https://www.googletagmanager.com;" always;
  add_header Vary "Accept-Encoding" always;

  location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|webp|ico|woff2?|ttf|otf)$ {
    expires 1y;
    try_files $uri =404;
  }

  location / {
    expires 5m;
    try_files $uri $uri/ /index.html;
  }
}
