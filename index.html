<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Custom Software Development and Business Systems | Incenti Tech</title>
    <meta
      name="description"
      content="Incenti Tech develops custom software, business systems, and digital solutions for companies in Portuguese and English."
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="author" content="Incenti Tech" />
    <meta name="theme-color" content="#080d1f" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" sizes="any" />
    <link rel="canonical" href="https://incentitech.com.br/en/" />
    <link rel="alternate" hreflang="pt-BR" href="https://incentitech.com.br/pt-br/" />
    <link rel="alternate" hreflang="en" href="https://incentitech.com.br/en/" />
    <link rel="alternate" hreflang="x-default" href="https://incentitech.com.br/en/" />

    <script>
      (function () {
        var pathname = window.location.pathname;
        if (pathname !== "/" && pathname !== "/index.html") {
          return;
        }

        var preferred = "en";
        var languages = Array.isArray(navigator.languages) && navigator.languages.length > 0
          ? navigator.languages
          : [navigator.language || ""];

        for (var i = 0; i < languages.length; i += 1) {
          if (String(languages[i]).trim().toLowerCase() === "pt-br") {
            preferred = "pt-br";
            break;
          }
        }

        window.location.replace(preferred === "pt-br" ? "/pt-br/" : "/en/");
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <noscript>
      <p>
        Select your language:
        <a href="/en/">English</a>
        |
        <a href="/pt-br/">Português</a>
      </p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
